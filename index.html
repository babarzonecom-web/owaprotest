<script>
(function(){
  const log = function(type, args){
    const el = document.getElementById('__debug_log');
    if(!el) return;
    const line = document.createElement('div');
    line.style.color = type==='error' ? '#ff7d72' : type==='warn' ? '#ffb52e' : '#54e08c';
    line.style.borderBottom = '1px solid #1a3a1a';
    line.style.padding = '2px 0';
    line.textContent = '['+type.toUpperCase()+'] ' + Array.from(args).map(a=>{ try{return typeof a==='object'?JSON.stringify(a):String(a);}catch(e){return String(a);} }).join(' ');
    el.appendChild(line);
    el.scrollTop = el.scrollHeight;
  };
  const _log = console.log.bind(console);
  const _err = console.error.bind(console);
  const _warn = console.warn.bind(console);
  console.log = function(){ log('log', arguments); _log.apply(console, arguments); };
  console.error = function(){ log('error', arguments); _err.apply(console, arguments); };
  console.warn = function(){ log('warn', arguments); _warn.apply(console, arguments); };
  window.addEventListener('error', function(e){ log('error', [e.message + ' (' + e.filename + ':' + e.lineno + ':' + e.colno + ') stack:' + (e.error&&e.error.stack?e.error.stack.slice(0,200):'')]); });
  window.addEventListener('unhandledrejection', function(e){ log('error', ['Unhandled Promise: ' + (e.reason&&e.reason.message||e.reason)]); });
  console.log('Debug console ready');
})();
</script>

function applyResult(code, bases, outs, batterName) {
  
  const n1=bases[0], n2=bases[1], n3=bases[2];
  const BN = batterName || "打者";
  let b = [null,null,null];
  let runs = 0;
  let scoredNames = []; 
  let newOuts = outs;
  let batterOn = -1; 

  switch(code){
    case "HR": {
      scoredNames = [...[n1,n2,n3].filter(Boolean), BN];
      runs = scoredNames.length;
      b = [null,null,null]; batterOn=-1; break;
    }
    case "H3": {
      scoredNames = [n1,n2,n3].filter(Boolean);
      runs = scoredNames.length;
      b = [null,null,BN]; batterOn=2; break;
    }
    case "H2": {
      scoredNames = [n2,n3].filter(Boolean);
      runs = scoredNames.length;
      b = [null,BN,n1||null]; batterOn=1; break;
    }
    case "H1": {
      // シングル: n3→得点（デフォルト）、n2→3塁（デフォルト）、n1→2塁、打者→1塁
      // ランナーの進塁はモーダルで調整可能
      scoredNames = n3 ? [n3] : [];
      runs = scoredNames.length;
      b = [BN, n1||null, n2||null]; batterOn=0; break;
    }
    case "BB": case "HBP": case "IBB": {
      if(!n1){
        b=[BN,n2,n3];
      } else if(!n2){
        b=[BN,n1,n3];
      } else if(!n3){
        b=[BN,n1,n2];
      } else {
        
        scoredNames=[n3]; runs=1;
        b=[BN,n1,n2];
      }
      batterOn=0; break;
    }
    case "K": case "KL": {
      newOuts=outs+1; b=[n1,n2,n3]; batterOn=-1; break;
    }
    case "KW": {
      
      if(!n1){       b=[BN,n2,n3]; }
      else if(!n2){  b=[BN,n1,n3]; }
      else if(!n3){  b=[BN,n1,n2]; }
      else { scoredNames=[n3]; runs=1; b=[BN,n1,n2]; } 
      batterOn=0; break;
    }
    case "GO": {
      // ゴロ: 打者アウト、3塁ランナーは得点扱いでモーダルへ
      newOuts=outs+1;
      b=[null,n1,n2];
      if(n3){ scoredNames=[n3]; runs=1; }
      batterOn=-1; break;
    }
    case "FO": case "LO": case "FF": {
      // フライ/ファウルフライ: 打者アウト、ランナーはそのまま（タッチアップは調整モーダルで）
      newOuts=outs+1; b=[n1,n2,n3]; batterOn=-1; break;
    }
    case "TP": {
      newOuts=outs+3; b=[null,null,null]; batterOn=-1; break;
    }
    case "DP": {
      // 併殺: 2アウト。どのランナーがアウトかはケースバイケースなので
      // postBasesを空にして進塁モーダルで全員手動調整できるようにする
      newOuts=Math.min(outs+2,3);
      b=[null,null,null];
      batterOn=-1; break;
    }
    case "E": {
      // エラー: 打者出塁、ランナーは進塁調整モーダルで決定
      b=[BN,n1,n2]; batterOn=0; break;
    }
    case "FC": {
      // フィールダーズチョイス: 打者必ず1塁出塁、アウトカウント増えない
      // ランナーは1つずつ進塁（調整モーダルで変更可能）
      b=[BN, n1||null, n2||null]; batterOn=0; break;
    }
    case "SAC": {
      // 犠打: 打者アウト、3塁ランナーは得点扱いでモーダルへ
      newOuts=outs+1;
      b=[null,n1,n2];
      if(n3){ scoredNames=[n3]; runs=1; }
      batterOn=-1; break;
    }
    case "SF": {
      // 犠飛: 打者アウト、3塁ランナー得点（犠飛は必ず3塁ランナー得点）
      newOuts=outs+1;
      if(n3){ scoredNames=[n3]; runs=1; }
      b=[n1,n2,null]; batterOn=-1; break;
    }
    case "CI": {
      // 打撃妨害: 打者出塁（四球と同じ押し出しルール）、打数なし
      if(!n1){        b=[BN,n2,n3]; }
      else if(!n2){   b=[BN,n1,n3]; }
      else if(!n3){   b=[BN,n1,n2]; }
      else { scoredNames=[n3]; runs=1; b=[BN,n1,n2]; }
      batterOn=0; break;
    }
    case "OI": {
      // 守備妨害（打者走者アウト）: アウトカウント+1、ランナーはそのまま
      newOuts=outs+1; b=[n1,n2,n3]; batterOn=-1; break;
    }
    default: b=[n1,n2,n3]; break;
  }

  if(newOuts>=3){ b=[null,null,null]; scoredNames=[]; runs=0; }
  
  const batterScored = scoredNames.includes(BN);
  return { newBases:b, runs, newOuts, batterOn, scoredNames, batterScored };
}

function DatePickerModal({ value, onConfirm, onClose }){
  const today = new Date();
  const parse = (s)=>{
    const m=(s||"").match(/^(\d{4})-(\d{2})-(\d{2})$/);
    if(m) return {y:+m[1], mo:+m[2], d:+m[3]};
    return {y:today.getFullYear(), mo:today.getMonth()+1, d:today.getDate()};
  };
  const init = parse(value);
  const [viewY, setViewY] = React.useState(init.y);
  const [viewM, setViewM] = React.useState(init.mo);
  const [selY, setSelY] = React.useState(init.y);
  const [selM, setSelM] = React.useState(init.mo);
  const [selD, setSelD] = React.useState(init.d);
  const pad = n => String(n).padStart(2,"0");
  const daysInMonth = new Date(viewY, viewM, 0).getDate();
  const firstDow = new Date(viewY, viewM-1, 1).getDay();
  const startBlank = (firstDow + 6) % 7;
  const prevMonth = ()=>{ if(viewM===1){ setViewY(viewY-1); setViewM(12); } else setViewM(viewM-1); };
  const nextMonth = ()=>{ if(viewM===12){ setViewY(viewY+1); setViewM(1); } else setViewM(viewM+1); };
  const cells = [];
  for(let i=0;i<startBlank;i++) cells.push(null);
  for(let d=1;d<=daysInMonth;d++) cells.push(d);
  const isSelected = (d)=> d===selD && viewY===selY && viewM===selM;
  const isToday = (d)=> viewY===today.getFullYear() && viewM===today.getMonth()+1 && d===today.getDate();
  const _btn = {background:"#16331f",border:"1px solid #2e4234",borderRadius:8,color:"#dff0e5",padding:"8px 14px",fontSize:16,cursor:"pointer"};
  const E = React.createElement;
  return E('div', {
      style:{position:"fixed",inset:0,background:"rgba(0,0,0,0.6)",zIndex:1000,
        display:"flex",alignItems:"center",justifyContent:"center",padding:20},
      onClick: (ev)=>{ ev.stopPropagation(); onClose(); }
    },
    E('div', {
      onClick: ev=>ev.stopPropagation(),
      style:{background:"#0f2018",border:"1px solid #2e4234",borderRadius:16,
        padding:18,width:"100%",maxWidth:340,boxShadow:"0 12px 40px rgba(0,0,0,0.5)"}
    },
      E('div',{style:{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}
        , E('button',{onClick:(ev)=>{ev.stopPropagation();prevMonth();}, style:_btn}, "‹")
        , E('div',{style:{fontSize:18,fontWeight:700,color:"#dff0e5"}}, viewY+"年 "+viewM+"月")
        , E('button',{onClick:(ev)=>{ev.stopPropagation();nextMonth();}, style:_btn}, "›")
      ),
      E('div',{style:{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:4,marginBottom:6}}
        , ["月","火","水","木","金","土","日"].map((w,i)=>
            E('div',{key:i,style:{textAlign:"center",fontSize:11,color:i>=5?"#7fa8d0":"#74897b",fontWeight:600}}, w))
      ),
      E('div',{style:{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:4}}
        , cells.map((d,i)=> d===null
            ? E('div',{key:"b"+i})
            : E('button',{ key:i,
                onClick:(ev)=>{ ev.stopPropagation(); setSelY(viewY); setSelM(viewM); setSelD(d); },
                style:{ aspectRatio:"1",border:"none",borderRadius:8,cursor:"pointer",
                  fontSize:15,fontWeight: isSelected(d)?800:500,
                  background: isSelected(d)?"#1d7a3e":(isToday(d)?"#16331f":"transparent"),
                  color: isSelected(d)?"#fff":"#cfe8d5" }
              }, d)
          )
      ),
      E('div',{style:{display:"flex",gap:8,marginTop:16}}
        , E('button',{onClick:(ev)=>{ev.stopPropagation();onClose();}, style:{..._btn,flex:1,background:"#1a2a20",color:"#9fb3a5"}}, "キャンセル")
        , E('button',{ onClick:(ev)=>{ ev.stopPropagation(); onConfirm(selY+"-"+pad(selM)+"-"+pad(selD)); },
            style:{..._btn,flex:1,background:"#1d7a3e",color:"#fff",fontWeight:700} }, "決定")
      )
    )
  );
}

  };

  // フィールド静止画をオフスクリーンに一度だけ描画
  let fieldCache=null;
  function buildField(){
    if(fieldCache) return fieldCache;
    const oc=document.createElement('canvas'); oc.width=500; oc.height=430;
    const c=oc.getContext('2d');
    const brownExp=Math.atan(10/95);
    c.save();c.beginPath();c.rect(0,0,500,cy+7);c.clip();
    const fR=230,fvx=cx,fvy=cy+51,fcr=20;
    const flx=fvx+fR*Math.cos(Math.PI*1.25),fly=fvy+fR*Math.sin(Math.PI*1.25);
    const frx=fvx+fR*Math.cos(Math.PI*1.75),fry=fvy+fR*Math.sin(Math.PI*1.75);
    c.beginPath();c.moveTo(fvx,fvy);
    c.arcTo(flx,fly,flx+100,fly-100,fcr);
    c.arc(fvx,fvy,fR,Math.PI*1.25+fcr/fR,Math.PI*1.75-fcr/fR);
    c.arcTo(frx,fry,fvx,fvy,fcr);
    c.closePath();c.fillStyle="#2d6e2a";c.fill();c.restore();
    c.beginPath();c.moveTo(cx,cy+7);
    c.arc(cx,cy+7,95,Math.PI*1.25-brownExp,Math.PI*1.75+brownExp);
    c.closePath();c.fillStyle="#c4894a";c.fill();
    c.beginPath();c.arc(cx,cy-2,42,0,Math.PI*2);c.fillStyle="#c4894a";c.fill();
    (function(){
      const rA=Math.PI*1.75+brownExp,lA=Math.PI*1.25-brownExp;
      const rc={x:cx+95*Math.cos(rA),y:cy+7+95*Math.sin(rA)};
      const lc={x:cx+95*Math.cos(lA),y:cy+7+95*Math.sin(lA)};
      function hit(px,py,dx,dy){const ax=px-cx,ay=py-(cy-2);const b=ax*dx+ay*dy,cc=ax*ax+ay*ay-42*42;const sq=Math.sqrt(b*b-cc);const t1=-b-sq,t2=-b+sq;const t=t1>=0?t1:t2;return{x:px+dx*t,y:py+dy*t};}
      const rFE=hit(cx,cy+7,Math.cos(rA),Math.sin(rA));
      const lFE=hit(cx,cy+7,Math.cos(lA),Math.sin(lA));
      const rPH=hit(rc.x,rc.y,-Math.cos(Math.PI*1.75),-Math.sin(Math.PI*1.75));
      const lPH=hit(lc.x,lc.y,-Math.cos(Math.PI*1.25),-Math.sin(Math.PI*1.25));
      const rFA=Math.atan2(rFE.y-(cy-2),rFE.x-cx),rPA=Math.atan2(rPH.y-(cy-2),rPH.x-cx);
      const lFA=Math.atan2(lFE.y-(cy-2),lFE.x-cx),lPA=Math.atan2(lPH.y-(cy-2),lPH.x-cx);
      c.fillStyle="#9c7248";
      c.beginPath();c.moveTo(rc.x,rc.y);c.lineTo(rFE.x,rFE.y);c.arc(cx,cy-2,42,rFA,rPA,false);c.closePath();c.fill();
      c.beginPath();c.moveTo(lc.x,lc.y);c.lineTo(lFE.x,lFE.y);c.arc(cx,cy-2,42,lFA,lPA,true);c.closePath();c.fill();
    })();
    c.fillStyle="#9c7248";
    c.beginPath();c.moveTo(cx,cy+7);c.lineTo(cx+22,cy-9);c.lineTo(cx+22,cy+9);c.closePath();c.fill();
    c.beginPath();c.moveTo(cx,cy+7);c.lineTo(cx-22,cy-9);c.lineTo(cx-22,cy+9);c.closePath();c.fill();
    function fanArcHit(dx,dy){const ay=-44;const b=ay*dy,cc=ay*ay-230*230;const t=-b+Math.sqrt(b*b-cc);return{x:cx+dx*t,y:(cy+7)+dy*t};}
    const fRf=fanArcHit(Math.cos(Math.PI*1.75),Math.sin(Math.PI*1.75));
    const fLf=fanArcHit(Math.cos(Math.PI*1.25),Math.sin(Math.PI*1.25));
    c.strokeStyle="#f0f0f0";c.lineWidth=2.5;
    c.beginPath();c.moveTo(fRf.x,fRf.y);c.lineTo((cx+(cy+7))-(cy-9),cy-9);c.stroke();
    c.beginPath();c.moveTo(fLf.x,fLf.y);c.lineTo((cy-9)-((cy+7)-cx),cy-9);c.stroke();
    const r=38;
    const fB={x:cx+r+2.5,y:cy-r-2.5},sB={x:cx,y:cy-r*2-5},tB={x:cx-r-2.5,y:cy-r-2.5};
    function dB(x,y){c.save();c.translate(x,y);c.rotate(Math.PI/4);c.fillStyle="#f5f5f0";c.fillRect(-5,-5,10,10);c.restore();}
    dB(fB.x,fB.y);dB(sB.x,sB.y);dB(tB.x,tB.y);
    c.beginPath();c.moveTo(cx-7,cy-8);c.lineTo(cx+7,cy-8);c.lineTo(cx+7,cy);c.lineTo(cx,cy+7);c.lineTo(cx-7,cy);c.closePath();c.fillStyle="#f5f5f0";c.fill();
    c.beginPath();c.arc(cx,cy-r-5,8,0,Math.PI*2);c.fillStyle="#b07840";c.fill();
    fieldCache=oc;
    return oc;
  }

  // プレー分類
  const ANIM_HIT = new Set(["H1","H2","H3","HR"]);
  const ANIM_OUT_DIR = new Set(["GO","FO","LO","FF"]); // 方向ありアウト
  const TEXT_ONLY = new Set(["DP","TP","FC","E","SAC","SF","OI","DI","OBI"]); // テキスト表示
  const dirLabel = {P:"投",C:"捕","1B":"一","2B":"二",SS:"遊","3B":"三",LF:"左",CF:"中",RF:"右",
                    投:"投",捕:"捕",一:"一",二:"二",三:"三",遊:"遊",左:"左",中:"中",右:"右"};
  const codeJa = {H1:"ヒット",H2:"二塁打",H3:"三塁打",HR:"ホームラン",BB:"フォアボール",HBP:"デッドボール",
    IBB:"敬遠",K:"三振",KL:"見逃し三振",GO:"ゴロ",FO:"フライ",LO:"ライナー",FF:"ファウルフライ",
    DP:"ゲッツー",TP:"トリプルプレー",FC:"フィールダースチョイス",E:"エラー",SAC:"犠打",SF:"犠飛",
    KW:"振り逃げ",OI:"守備妨害",DI:"守備妨害",OBI:"走塁妨害"};

  function Comp(props){
    const game = props.game||{};
    const canvasRef = R.useRef(null);
    const stateRef = R.useRef({
      runners:[], ball:{x:HOME.x,y:HOME.y,vis:false,h:0}, effects:[], particles:[], raf:0,
      animating:false, syncedBases:null
    });
    const lastSigRef = R.useRef(null);
    const finishedRef = R.useRef(false);

    // 守備位置→選手名マップ(守備側)
    const half = game.half||"top";
    const defSide = half==="top"?"home":"away";
    const defLineup = game[defSide+"Lineup"]||[];
    const posName = {};
    // 投手ポジションはlineupから取らない（投手タブのcurPitcherで上書きするため）
    defLineup.forEach(p=>{ if(p&&p.pos){ const abbr=abbrPos(p.pos); if(abbr!=="投") posName[abbr]=p.name; } });
    // 投手は必ず投手タブ専用データから取得
    const defPitchers = game[defSide+"Pitchers"]||[];
    const defPIdx = game[defSide+"PitcherIdx"]||0;
    const curPitcher = defPitchers[defPIdx];
    if(curPitcher && curPitcher.name){ posName["投"]=curPitcher.name; posName["P"]=curPitcher.name; }
    else {
      // 投手タブ未設定の場合のみlineupの投手ポジション選手を使う
      const lpPit = defLineup.find(p=>p&&(p.pos==="投手"||p.pos==="投"));
      if(lpPit&&lpPit.name){ posName["投"]=lpPit.name; posName["P"]=lpPit.name; }
    }

    // 現在の走者(bases)
    const _rb = game.bases||[null,null,null];
    const bases = Array.isArray(_rb)?_rb:[0,1,2].map(i=>(_rb[i]!=null?_rb[i]:null));

    // 現在の打者名(攻撃側のBatterIdx)
    const offSide2 = half==="top"?"away":"home";
    const offLineup = game[offSide2+"Lineup"]||[];
    const batterIdx = game[offSide2+"BatterIdx"]||0;
    const batterName = (offLineup[batterIdx]&&offLineup[batterIdx].name)||null;

    // 最新プレーの検出: log[0]
    const log = game.log||[];
    const latest = log[0]||null;

    // 描画ループ
    R.useEffect(()=>{
      const cv=canvasRef.current; if(!cv) return;
      const ctx=cv.getContext('2d');
      const field=buildField();
      const st=stateRef.current;

      // 走者スプライトをbasesから同期(アニメ中は触らない)
      function syncRunnersFromBases(){
        st.runners=[];
        for(let i=0;i<3;i++){ if(bases[i]) st.runners.push({pos:i+1,name:bases[i],color:"#FFB300"}); }
        st.syncedBases=bases.join(",");
      }
      // アニメ再生中でなく、かつbasesが前回同期から変わっていれば同期
      if(!st.animating && st.syncedBases!==bases.join(",")){
        syncRunnersFromBases();
      } else if(st.runners.length===0 && !st.animating){
        syncRunnersFromBases();
      }

      function basePos(p){
        const i=Math.floor(p), f=p-i;
        const a=BASE[i%4], b=BASE[(i+1)%4];
        return {x:a.x+(b.x-a.x)*f, y:a.y+(b.y-a.y)*f};
      }
      function draw(){
        ctx.clearRect(0,0,CW,CH);
        ctx.save();
        ctx.translate(OFX,OFY);
        ctx.drawImage(field,0,0);
        // 守備選手名
        ctx.font="700 13px -apple-system,sans-serif";
        ctx.textAlign="center";
        Object.keys(POS_XY).forEach(k=>{
          if(k.length>2) return; // 日本語側スキップ(英略のみ描画)
          const nm=posName[dirLabel[k]]||posName[k];
          if(!nm) return;
          const pt=POS_XY[k];
          const disp=nm.slice(0,4);
          const w=ctx.measureText(disp).width+10;
          ctx.fillStyle="rgba(8,15,30,0.78)";
          ctx.fillRect(pt.x-w/2,pt.y-9,w,18);
          ctx.fillStyle="#cfe8ff";
          ctx.fillText(disp,pt.x,pt.y+4);
        });
        // 走者
        st.runners.forEach(rn=>{
          const bi=Math.round(rn.pos)%4;
          const p=basePos(Math.min(rn.pos,3.999));
          ctx.beginPath();ctx.arc(p.x,p.y,6,0,Math.PI*2);
          ctx.fillStyle=rn.color;ctx.fill();
          ctx.strokeStyle="#fff";ctx.lineWidth=2;ctx.stroke();
          if(rn.name){
            // 塁別に名前を外側へ: 一塁=右下, 二塁=上, 三塁=左下
            let nx=p.x, ny=p.y+20, ta="center";
            if(bi===1){ nx=p.x+12; ny=p.y+18; ta="left"; }
            else if(bi===2){ nx=p.x; ny=p.y-16; ta="center"; }
            else if(bi===3){ nx=p.x-12; ny=p.y+18; ta="right"; }
            const nm=rn.name.slice(0,4);
            ctx.font="800 12px -apple-system,sans-serif";
            ctx.textAlign=ta;
            const w=ctx.measureText(nm).width+8;
            const bx = ta==="left"?nx-4 : ta==="right"?nx-w+4 : nx-w/2;
            ctx.fillStyle="rgba(255,179,0,0.9)";
            ctx.fillRect(bx,ny-10,w,17);
            ctx.fillStyle="#1a1000";
            ctx.fillText(nm,nx,ny+2);
          }
        });
        // 打者名(ホームベース下)
        if(batterName){
          const bn="打者 "+batterName.slice(0,5);
          ctx.font="800 12px -apple-system,sans-serif";
          ctx.textAlign="center";
          const bw=ctx.measureText(bn).width+12;
          ctx.fillStyle="rgba(245,158,11,0.95)";
          ctx.fillRect(cx-bw/2, cy+22, bw, 18);
          ctx.fillStyle="#1a1000";
          ctx.fillText(bn, cx, cy+35);
        }
        // ボール
        if(st.ball.vis){
          ctx.beginPath();ctx.arc(st.ball.x,st.ball.y-st.ball.h,4,0,Math.PI*2);
          ctx.fillStyle="#fff";ctx.fill();ctx.strokeStyle="#C62828";ctx.lineWidth=1;ctx.stroke();
        }
        // パーティクル
        st.particles=st.particles.filter(pt=>{
          pt.x+=pt.vx;pt.y+=pt.vy;pt.vy+=pt.g||0;pt.life--;
          ctx.globalAlpha=Math.max(0,pt.life/pt.max);
          ctx.beginPath();ctx.arc(pt.x,pt.y,pt.r,0,Math.PI*2);ctx.fillStyle=pt.c;ctx.fill();
          ctx.globalAlpha=1; return pt.life>0;
        });
        // エフェクト(テキスト/スタンプ)
        const now=performance.now();
        st.effects=st.effects.filter(e=>{
          const t=(now-e.t)/e.dur; if(t>=1) return false;
          if(e.type==="txt"){
            const sc=t<0.2?t/0.2:1, al=t>0.7?1-(t-0.7)/0.3:1;
            ctx.save();
            ctx.translate(-OFX,-OFY); // offsetを打ち消し実画面座標へ
            ctx.globalAlpha=al;
            ctx.font="900 "+(e.size*sc)+"px -apple-system,sans-serif";
            ctx.textAlign="center";ctx.lineWidth=4;ctx.strokeStyle="#fff";
            ctx.strokeText(e.txt,CW/2,e.y);ctx.fillStyle=e.color;ctx.fillText(e.txt,CW/2,e.y);
            if(e.sub){ ctx.font="700 14px -apple-system,sans-serif";
              ctx.lineWidth=3;ctx.strokeText(e.sub,CW/2,e.y+26);ctx.fillStyle="#1B3A1B";ctx.fillText(e.sub,CW/2,e.y+26);}
            ctx.restore();
          } else if(e.type==="stamp"){
            const sc=t<0.15?2-(t/0.15):1, al=t>0.75?1-(t-0.75)/0.25:1;
            ctx.save();ctx.globalAlpha=al;ctx.translate(e.x,e.y);ctx.scale(sc,sc);ctx.rotate(-0.12);
            ctx.font="900 24px -apple-system,sans-serif";ctx.textAlign="center";
            ctx.lineWidth=6;ctx.strokeStyle="#fff";ctx.strokeText(e.txt,0,0);
            ctx.fillStyle=e.color;ctx.fillText(e.txt,0,0);ctx.restore();
          } else if(e.type==="gameset"){
            ctx.save();
            ctx.translate(-OFX,-OFY);
            // 暗幕
            const veil = t<0.3? (t/0.3)*0.55 : (t>0.8?(1-(t-0.8)/0.2)*0.55:0.55);
            ctx.globalAlpha=veil; ctx.fillStyle="#000";
            ctx.fillRect(0,0,CW,CH);
            // GAME SET 文字
            const pop = t<0.25? (t/0.25) : 1;
            const sc2 = 0.6+0.4*Math.min(1,pop*1.4);
            const al2 = t>0.85?1-(t-0.85)/0.15:1;
            ctx.globalAlpha=al2;
            ctx.textAlign="center";
            ctx.translate(CW/2, CH/2-6);
            ctx.scale(sc2,sc2);
            // ゴールドグラデ風(2色重ね)
            ctx.font="900 46px -apple-system,sans-serif";
            ctx.lineWidth=8; ctx.strokeStyle="#1a1000";
            ctx.strokeText("GAME SET", 0, 0);
            ctx.fillStyle="#FFD54F";
            ctx.fillText("GAME SET", 0, 0);
            ctx.font="900 20px -apple-system,sans-serif";
            ctx.lineWidth=5; ctx.strokeStyle="#1a1000";
            ctx.strokeText("!!", 0, 30);
            ctx.fillStyle="#FFD54F";
            ctx.restore();
          }
          return true;
        });
        ctx.restore();
        st.raf=requestAnimationFrame(draw);
      }
      draw();
      return ()=>cancelAnimationFrame(st.raf);
    },[posName, bases.join(","), batterName]);

    // 最新プレーが変わったらアニメ
    R.useEffect(()=>{
      if(!latest) return;
      const sig=(latest.ts||"")+"|"+(latest.msg||"");
      if(lastSigRef.current===null){ lastSigRef.current=sig; return; } // 初回は再生しない
      if(lastSigRef.current===sig) return;
      lastSigRef.current=sig;
      // 選手交代・投手交代は専用演出
      if(latest.logType==="sub" || /交代|登板/.test(latest.msg||"")){
        playSub(latest);
        return;
      }
      playLatest(latest);
    },[latest&&latest.ts, latest&&latest.msg]);

    // 試合終了でGAME SET演出
    R.useEffect(()=>{
      if(game.finished && !finishedRef.current){
        finishedRef.current=true;
        const st=stateRef.current;
        st.effects.push({type:"gameset",t:performance.now(),dur:4000});
      }
      if(!game.finished) finishedRef.current=false;
    },[game.finished]);

    // 選手交代演出
    function playSub(entry){
      const st=stateRef.current;
      const msg=entry.msg||"";
      function fxTxt2(txt,color,size,y,sub){ st.effects.push({type:"txt",txt,color,size:size||28,y:y||100,sub,t:performance.now(),dur:2200}); }
      let title="選手交代", sub="";
      // 投手交代: 【チーム】投手交代: 新投手 登板（...）
      let m=msg.match(/投手交代:\s*(.+?)\s*登板/);
      if(m){ title="投手交代！"; sub=m[1]+" 投手"; }
      else {
        // 野手交代: 【チーム】交代: 退(ポジ) → 新(ポジ) ...
        m=msg.match(/交代:\s*(.+?)\(([^)]*)\)\s*→\s*(.+?)\(([^)]*)\)/);
        if(m){ title="選手交代！"; sub=m[3]+"（"+(m[4]||"-")+"）"; }
        else {
          // ポジション変更: ポジション変更: 選手 旧→新
          m=msg.match(/ポジション変更:\s*(.+?)\s+(.+?)→(.+?)\s*\(/);
          if(m){ title="守備変更"; sub=m[1]+" "+m[2]+"→"+m[3]; }
        }
      }
      fxTxt2(title,"#7dd3fc",30,100, sub);
    }

    // プレー再生
    function playLatest(entry){
      const st=stateRef.current;
      const runs = entry.runs||0;
      // 走塁系（盗塁・暴投・捕逸・ボーク・走塁死など）はlogTypeまたはmsgから直接判定
      const SB_CODES = new Set(["SB","CS","PO","RO","WP","PB","BK","FC"]);
      let code, dir;
      if(entry.logType && SB_CODES.has(entry.logType)){
        // 走塁ログはcodeをそのまま使う（打席のcode/dirは不要）
        code = entry.logType;
        dir  = null;
      } else if(entry.logType==="run" || /生還|得点|スコア/.test(entry.msg||"")){
        code = "run";
        dir  = null;
      } else {
        // 通常打席はextractPlayで取得
        const info = extractPlay(game, entry);
        code = info.code;
        dir  = info.dir;
      }

      function fxTxt(txt,color,size,y,sub){ st.effects.push({type:"txt",txt,color,size:size||30,y:y||110,sub,t:performance.now(),dur:2000}); }
      function fxStamp(txt,x,y,color){ st.effects.push({type:"stamp",txt,x,y,color,t:performance.now(),dur:1600}); }
      function firework(x,y){const cols=["#FFD54F","#EF5350","#42A5F5","#66BB6A","#FFA726"];for(let i=0;i<26;i++){const a=Math.PI*2*i/26;const sp=1.5+Math.random()*2;st.particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,g:0.04,r:2,c:cols[i%5],life:46,max:46});}}
      const wait=ms=>new Promise(r=>setTimeout(r,ms));
      function tween(dur,fn){return new Promise(res=>{const t0=performance.now();function s(t){const p=Math.min(1,(t-t0)/dur);fn(p);if(p<1)requestAnimationFrame(s);else res();}requestAnimationFrame(s);});}
      const easeOut=p=>1-Math.pow(1-p,2);
      async function ballFly(to,dur,peak){st.ball.x=HOME.x;st.ball.y=HOME.y;st.ball.h=0;st.ball.vis=true;const f={x:HOME.x,y:HOME.y};await tween(dur,p=>{st.ball.x=f.x+(to.x-f.x)*p;st.ball.y=f.y+(to.y-f.y)*p;st.ball.h=peak*Math.sin(Math.PI*p);});st.ball.h=0;}
      async function ballGround(to,dur){st.ball.x=HOME.x;st.ball.y=HOME.y;st.ball.h=0;st.ball.vis=true;const f={x:HOME.x,y:HOME.y};await tween(dur,p=>{const e=easeOut(p);st.ball.x=f.x+(to.x-f.x)*e;st.ball.y=f.y+(to.y-f.y)*e;st.ball.h=Math.abs(Math.sin(p*Math.PI*4))*4*(1-p);});st.ball.h=0;}

      // 打球到達点(守備名ラベルとは別。LF/RFはライン際でなく内側へ)
      const HIT_XY = {
        P:POS_XY.P, C:POS_XY.C, "1B":POS_XY["1B"], "2B":POS_XY["2B"],
        SS:POS_XY.SS, "3B":POS_XY["3B"],
        LF:{x:cx-88, y:cy-118}, 左:{x:cx-88, y:cy-118},
        CF:{x:cx,    y:cy-138}, 中:{x:cx,    y:cy-138},
        RF:{x:cx+88, y:cy-118}, 右:{x:cx+88, y:cy-118},
        投:POS_XY.P, 捕:POS_XY.C, 一:POS_XY["1B"], 二:POS_XY["2B"],
        遊:POS_XY.SS, 三:POS_XY["3B"],
      };
      const tgt = HIT_XY[dir]||HIT_XY.CF;

      // 走者を最新basesへ反映する関数(結果テロップと同時に呼ぶ)
      function revealRunners(){
        st.runners=[];
        const _r=game.bases||[null,null,null];
        const nb=Array.isArray(_r)?_r:[0,1,2].map(i=>(_r[i]!=null?_r[i]:null));
        for(let i=0;i<3;i++){ if(nb[i]) st.runners.push({pos:i+1,name:nb[i],color:"#FFB300"}); }
        st.syncedBases=nb.join(",");
      }

      st.animating=true; // アニメ中はbasesの自動同期を止める
      st.ball.vis=false; st.ball.x=HOME.x; st.ball.y=HOME.y; st.ball.h=0; // 前プレーの残像を消す

      // 振り分け
      (async()=>{
       try{

    );
  }

  // 最新打席のcode/dirを抽出
  // 最新ログ(latest)を渡し、その打者名・イニングから正確に打席を特定
  function extractPlay(game, latest){
    const half=game.half||"top";
    const offSide = half==="top"?"away":"home";
    const lineup = game[offSide+"Lineup"]||[];
    const msg = (latest&&latest.msg)||"";

    // msgから打者名を抽出: 【チーム】打者名 → 結果（N回）
    let batterName=null, logInn=null;
    const m = msg.match(/】\s*([^→\s]+)\s*→/);
    if(m) batterName=m[1];
    const im = msg.match(/（(\d+)回）/);
    if(im) logInn=Number(im[1]);

    // 打者名が取れたら、その打者の該当イニング打席を引く
    if(batterName){
      const p = lineup.find(pl=>pl && pl.name===batterName);
      if(p && p.atBats){
        if(logInn!=null && p.atBats[logInn]!=null){
          const arr=Array.isArray(p.atBats[logInn])?p.atBats[logInn]:[p.atBats[logInn]];
          const e=arr[arr.length-1];
          if(e&&e.code) return {code:e.code, dir:e.dir};
        }
        // イニング不明 or 一致せず → その打者の最大イニング末尾
        const inns=Object.keys(p.atBats).map(Number).sort((a,b)=>b-a);
        for(const inn of inns){
          const arr=Array.isArray(p.atBats[inn])?p.atBats[inn]:[p.atBats[inn]];
          const e=arr[arr.length-1];
          if(e&&e.code) return {code:e.code, dir:e.dir};
        }
      }
    }

    // フォールバック: 全打者の最大イニング末尾
    let best=null, bestInn=-1;
    lineup.forEach(p=>{
      const ab=p.atBats||{};
      Object.keys(ab).map(Number).forEach(inn=>{
        const arr=Array.isArray(ab[inn])?ab[inn]:[ab[inn]];
        const e=arr[arr.length-1];
        if(e&&e.code&&inn>=bestInn){ bestInn=inn; best=e; }
      });
    });
    return { code: best?best.code:null, dir: best?best.dir:null };
  }

  return Comp;
})();

// ================================================================
// 🔒 LOCKED ZONE START - 成績・記録計算ロジック 変更禁止
// ================================================================
// このゾーン内の関数は野球の公式ルールに基づく計算ロジックです。
// バグ修正・機能追加であっても、変更する場合は必ず事前に許可を求めること。
//
// 対象関数：
//   - recomputeScores  : 得点再計算
//   - computeStats     : 打撃成績計算
//   - computePitcherStats : 投手成績計算（v447/v468仕様）
//
// 重要な不変条件（絶対に変えないこと）：
//   - pLogIdx  : 打席ごとの投手直接紐づけフィールド（廃止・変更禁止）
//   - erManual : 自責点の正式記録フィールド（autoErは廃止済み）
//   - fromSeq  : イニング番号のみ使用（打席数ベースの計算は禁止）
//   - allAtBats: 攻撃ハーフイニングのみを含む（守備側は含めない）
// ================================================================
const recomputeScores = (g) => { // 🔒 LOCKED
  const aScore={...g.awayScore}, hScore={...g.homeScore};
  // 全イニング（延長含む）のキーを取得
  const allInns = new Set([
    ...Array.from({length:g.innings||9},(_,i)=>i+1),
    ...Object.keys(g.awayScore||{}).map(Number),
    ...Object.keys(g.homeScore||{}).map(Number),
  ]);
  allInns.forEach(inn=>{
    let ar=0, hr=0, aHas=false, hHas=false;
    (g.awayLineup||[]).forEach(p=>{ if(p) toList(p.atBats,inn).forEach(e=>{ ar+=norm(e).runs||0; aHas=true; }); });
    (g.homeLineup||[]).forEach(p=>{ if(p) toList(p.atBats,inn).forEach(e=>{ hr+=norm(e).runs||0; hHas=true; }); });

    // atBatsのruns合計を正とし、盗塁等（recordSBで直接加算）の分を上乗せする
    // recordSBはscoreKeyに直接加算しているので、atBatsで説明できない分がある
    if(aHas){
      const prev = parseInt(g.awayScore[inn])||0;
      const extra = Math.max(0, prev - ar); // 盗塁等で直接加算された分
      aScore[inn] = ar + extra;
    }
    if(hHas){
      const prev = parseInt(g.homeScore[inn])||0;
      const extra = Math.max(0, prev - hr);
      hScore[inn] = hr + extra;
    }
  });
  return {awayScore:aScore, homeScore:hScore};
};

const computeOneStats = (p) => {
  let ab=0,h=0,hr=0,bb=0,hbp=0,k=0,tb=0,r=0,sac=0,sf=0;
  const atBatsObj = p.atBats || {};
  let ci=0;
  Object.values(atBatsObj).flat().forEach(e=>{
    const ne=norm(e); const code=ne.code; if(!code) return;
    if(!NOAB_CODES.has(code)) ab++;
    if(HIT_CODES.has(code)){h++;tb+=code==="H1"?1:code==="H2"?2:code==="H3"?3:4;}
    if(code==="HR") hr++;
    if(code==="BB"||code==="IBB") bb++;  // IBBは四球に含む。CI(打撃妨害)は四球ではないので除外
    if(code==="CI") ci++;                // 打撃妨害は独立カウント
    if(code==="HBP") hbp++;
    if(code==="K"||code==="KL"||code==="KW") k++;
    if(code==="SAC") sac++;
    if(code==="SF")  sf++;
  });
  r += (p.run||0);
  // 打席数: 打撃妨害も打席として成立するので含める
  const pa = ab + bb + hbp + sac + sf + ci;
  const slg = ab>0 ? (tb/ab) : 0;
  // 出塁率: (H+BB+HBP)/(AB+BB+HBP+SF)  ※犠打(SAC)と打撃妨害(CI)は分母から除外(公式規則)
  const obp = (ab+bb+hbp+sf)>0 ? ((h+bb+hbp)/(ab+bb+hbp+sf)) : 0;
  const ops = obp + slg;
  const fmtAvg = v => v>0 ? v.toFixed(3).replace(/^0/,"") : ".---";
  return {...p,_pa:pa,_ab:ab,_h:h,_hr:hr,_bb:bb,_hbp:hbp,_k:k,_tb:tb,_r:r,_ci:ci,
    _avg:ab>0?(h/ab).toFixed(3).replace(/^0/,""):".---",
    _slg:ab>0?fmtAvg(slg):".---",
    _obp:(ab+bb+hbp)>0?fmtAvg(obp):".---",
    _ops:ops>0?ops.toFixed(3).replace(/^0/,""):".---",
  };
};

const computeStats = (players) => { // 🔒 LOCKED
  const rows = [];
  players.forEach(p => {
    // _subOuts配列（旧_subOut単体も吸収）から過去選手を先に追加
    const legacySubOut = p._subOut && !p._subOuts ? [p._subOut] : [];
    const subOuts = [...legacySubOut, ...(p._subOuts || [])];
    subOuts.forEach((prev, idx) => {
      const nextName = idx < subOuts.length-1 ? subOuts[idx+1].name : p.name;
      rows.push(computeOneStats({
        ...prev,
        id: (p.id||p.name) + "_subout_" + idx,
        order: p.order,
        _subOutLabel: true,
        _nextName: nextName,
      }));
    });
    // 現在の選手
    rows.push(computeOneStats({
      ...p,
      _subOut: null,
      _subOuts: null,
      _isSub: subOuts.length > 0,
      _prevName: subOuts.length > 0 ? subOuts[subOuts.length-1].name : null,
    }));
  });
  return rows;
};
const computePitcherStats = (g) => { // 🔒 LOCKED - v447/v468仕様 変更禁止

          [...legacySub, ...(p._subOuts||[])].forEach(so=>{

        halfAtBats.sort((a,b)=> a.pi!==b.pi ? a.pi-b.pi : a.ei-b.ei);

        // outsInHalfを累積しながらallAtBatsに追加（3アウトで上限）
        let outsInHalf = 0;
        halfAtBats.forEach(({pi, ei, e:ne})=>{
          const hasError = !!(ne.errorPos);
          allAtBats.push({inning:inn, half, playerIdx:pi, entryIdx:ei, entry:ne, outsAtAb:Math.min(outsInHalf,2), hasError, seq:allAtBats.length, _seqValid:true});
          if(outsInHalf < 3){
            if(OUT_CODES_FOR_IP.has(ne.code) && !hasError) outsInHalf++;
            if(ne.code==="DP" && !hasError) outsInHalf++;
            if(ne.code==="TP" && !hasError) outsInHalf += 2;

      });
    });

    
    // pitchersが配列でない場合の防御
    const rawPitchers = Array.isArray(pitchers) ? pitchers : (pitchers ? Object.values(pitchers) : []);
    // nullエントリはindexを保持するため空オブジェクトに変換（nameなしはスキップ）

    if(!safePitchers.length || safePitchers.every(p=>!p.name)) { result[defTeam]=[]; return; }
    const stats = safePitchers.map(p=>({...p, autoIp:0, autoH:0, autoEr:0, autoBb:0, autoK:0, autoHbp:0, autoHr:0, autoRuns:0, autoTbf:0, _outsGot:0, _brOutsCount:0}));

    const starterIdx = sortedLog.length>0 ? sortedLog[0].pitcherIdx : 0;

    const log = rawLog.length>0 ? rawLog : [{pitcherIdx:starterIdx, fromInning:1, fromHalf:starterHalf, outsAtStart:0, atBatSeq:0}];

    // 打席の通し番号(seq)ベースで担当投手を特定するヘルパー

    // fromSeq以上のseqを持つ打席が新投手の担当
    const buildSeqLog = () => {
      return log.map((l, li) => {
        // atBatSeqが記録されている場合はそれをfromSeqとして直接使用
        if(l.atBatSeq !== undefined && l.atBatSeq >= 0) {

        if(l.atBatSeq === -1 || l.atBatSeq === -2) {
          // allAtBatsは攻撃チーム(offTeam)の打席のみ含む

        const logTime = l.fromInning*2 + (l.fromHalf==="top"?0:1);
        const outs = l.outsAtStart||0;
        const prevFromSeq = log[li-1].atBatSeq !== undefined ? log[li-1].atBatSeq : 0;
        const nextAb = allAtBats.find(ab=>{
          if(ab.inning < l.fromInning) return false;
          if(ab.inning === l.fromInning) return (ab.outsAtAb||0) >= outs;
          return true;
        });
        return {...l, fromSeq: nextAb ? nextAb.seq : allAtBats.length};
      });
    };
        const seqLog = buildSeqLog().sort((a,b)=>a.fromSeq-b.fromSeq);

    const findActivePitcher = (abSeq) => {
      // seqがundefined（旧データ）の場合は現在の投手インデックスを返す

    const resolveActivePitcher = (ab) => {

      let activePIdx;
      if(bo.pitcherIdx !== undefined) {
        activePIdx = bo.pitcherIdx;
      } else {
        // 旧データ：seqで逆引き
        const boTime = (bo.inning||0)*2+((bo.half==="top")?0:1);
        const boOutsN = bo.outsAtTime||0;
        let brSeq = 0;
        for(let k=0;k<allAtBats.length;k++){
          const ab=allAtBats[k];
          const at=ab.inning*2+(ab.half==="top"?0:1);
          if(at < boTime) brSeq = ab.seq;
          else if(at === boTime && (ab.outsAtAb||0) < boOutsN) brSeq = ab.seq;
        }
        activePIdx = findActivePitcher(brSeq);
      }
      const ps = stats[activePIdx];
      if(ps) { ps._outsGot++; ps._brOutsCount++; }
    });

    // 試合終了時のアウト補正
    // 最終投手にfinalOutsまでのアウトを補完（試合終了ボタンで記録漏れを防ぐ）
    if(g.finished && g.finalOuts !== undefined && g.finalHalf !== undefined) {
      // 最終ハーフの総アウト数を計算（allAtBatsから）
      const finalHalfOuts = allAtBats.filter(ab =>
        ab.inning === g.finalInning && ab.half === g.finalHalf && OUT_CODES_FOR_IP.has(ab.entry.code) && !ab.hasError
      ).length + allAtBats.filter(ab =>
        ab.inning === g.finalInning && ab.half === g.finalHalf && ab.entry.code === "DP" && !ab.hasError
      ).length + allAtBats.filter(ab =>
        ab.inning === g.finalInning && ab.half === g.finalHalf && ab.entry.code === "TP" && !ab.hasError
      ).length * 2;
      const brOutsInFinalHalf = (g.baserunnerOuts||[]).filter(bo =>
        bo.defTeam === defTeam && bo.inning === g.finalInning && bo.half === g.finalHalf
      ).length;
      const totalFinalOuts = finalHalfOuts + brOutsInFinalHalf;
      const expectedOuts = g.finalOuts;
      if(totalFinalOuts < expectedOuts) {
        // 差分を「実際に最後に投げている投手」に補完(配列末尾だと未登板投手に付く不具合を回避)
        const lastPitcher = stats[currentPIdx] || (stats.length > 0 ? stats[stats.length - 1] : null);
        if(lastPitcher) {
          const diff = expectedOuts - totalFinalOuts;
          lastPitcher._outsGot += diff;
        }
      }
    }
    stats.forEach(ps=>{
      ps.autoIp = Math.floor(ps._outsGot/3)*10 + (ps._outsGot%3); 
    });

    result[defTeam] = stats;
  });
  return result;
};

        half:   changeOccurs ? (g.half==="top"?"bottom":"top") : g.half,
        baserunnerOuts: brOuts,
      };
      const batterKey = team+"BatterIdx";
      const lineupLen = lineup.length;
      nextPidx = ((Number.isFinite(pidx)?pidx:0)+1) % lineupLen;
      const scores=recomputeScores(tmp);
      const zl=ZONES.find(z=>z.id===dir);
      const baseLabel = b => b===0?'一塁':b===1?'二塁':b===2?'三塁':b==='scored'?'得点':b==='out'?'アウト':'?';
      // ランナー移動サマリー（手動調整分）
      // g.bases はFirebase経由でオブジェクト化される場合があるため配列に正規化
      const _rawBases = g.bases || [null,null,null];
      const preBasesSnap = Array.isArray(_rawBases)
        ? _rawBases
        : [0,1,2].map(i => _rawBases[i] != null ? _rawBases[i] : null);
      let runnerNote = '';
      {
        const moved = [];
        // 得点したランナー（打者以外）
        (scoredNames||[]).forEach(n => { if(n !== batterName) moved.push(n+'→得点'); });
        if(newBases !== undefined) {
          // 塁上に残ったランナーの移動（打者以外）
          [0,1,2].forEach(j => {
            const nb = newBases[j];
            if(nb && nb !== batterName) {
              const from = preBasesSnap.indexOf(nb);
              if(from !== -1 && from !== j) moved.push(nb+'→'+(j===0?'一':j===1?'二':'三')+'塁');
            }
          });
          // アウトになったランナー（打者以外）
          preBasesSnap.forEach(n => {
            if(!n || n === batterName) return;
            const survivedOnBase = (newBases||[]).includes(n);
            const scored = (scoredNames||[]).includes(n);
            if(!survivedOnBase && !scored) moved.push(n+'→アウト');
          });
        }
        if(moved.length) runnerNote = ' (' + moved.join(' / ') + ')';
      }
      const isOutCode = ["K","KL","GO","FO","LO","FF","DP","TP","SAC","SF","OI"].includes(code);
      const logType = (runs||0)>0?"score":isOutCode?"out":"normal";
      const log=[{
        ts:new Date().toLocaleTimeString("ja-JP",{hour:"2-digit",minute:"2-digit"}),
        msg:`【${g[team+"Team"]}】${lineup[pidx].name} → ${_optionalChain([rOf, 'call', _7 => _7(code), 'optionalAccess', _8 => _8.label])||code}${zl?`(${zl.label})`:""}${(runs||0)>0?` [${runs}点]`:""}${runnerNote}（${inning}回）`,
        runs:runs||0, logType
      },...(g.log||[]).slice(0,99)];
      return {...tmp,...scores,log,[batterKey]:nextPidx};
    });
    setSelDir(null);
    // 打席結果の1球を投手に加算（IBBは加算なし。BSFは押下時に加算済み。自動BB/三振は加算なし）
    if(code !== "IBB" && !skipPitchAdd) {
      const defSide2 = team === "away" ? "home" : "away";
      mutGame(g => {
        const pitchers = [...(g[defSide2+"Pitchers"]||[])];
        const pidx = g[defSide2+"PitcherIdx"]||0;
        if(pitchers[pidx]) {
          pitchers[pidx] = {...pitchers[pidx], pitchCount:(pitchers[pidx].pitchCount||0)+1};
        }
        return {...g, [defSide2+"Pitchers"]:pitchers};
      });

    setPitchCount({b:0,s:0,f:0});
    setPitchHistory([]);
    
    const wasChange = newOuts>=3;
    if(wasChange){
      setModal(null);
      showToast(`チェンジ！ ${_optionalChain([rOf, 'call', _9 => _9(code), 'optionalAccess', _10 => _10.label])||code} 記録`);
    } else {

                  _nextBatter:{team, pidx:nextPidx, inning}});

      showToast(`${_optionalChain([rOf, 'call', _11 => _11(code), 'optionalAccess', _12 => _12.label])||code}${(runs||0)>0?` +${runs}点`:""} ✅`);
      
      // pitchModeはgameから直接取得（クロージャの古い値を避けるため）
      const currentPitchMode = document.body.getAttribute("data-pitch-mode") || "result";
      // 得点がある場合は自責点モーダルを優先するため、次打者の自動表示はしない

  // 複数ランナー対応の進塁記録
  // moves: [{runner:{bi,name}, destBi, isOut}]
  // type: 進塁の種別（SB/WP/PB/BK/OBI/ADV/CS/PO）
  // primaryPidx: 主体となる選手のlineupインデックス（盗塁成功/刺のカウント用）
  const recordSB = useCallback((team, moves, type, primaryPidx)=>{
    const isOutType = type==="CS" || type==="PO" || type==="RO";
    const isSB      = type==="SB";
    let _scoredForEr = [];  // 得点した走者(自責点モーダル用にmutGameの外で保持)
    let _erInning = game.inning;

    mutGame(g=>{
      const lk = team+"Lineup";
      let lineup = [...g[lk]];
      const _gb = Array.isArray(g.bases) ? g.bases : [0,1,2].map(i => (g.bases&&g.bases[i]!=null)?g.bases[i]:null);
      let newBases = [..._gb];
      let scoreAdd = 0;
      const scoredRunners = [];

      // 盗塁/刺カウントを各ランナーに加算
      // SB→盗塁+1、CS/PO→盗塁刺+1、RO→カウントなし（走塁死は盗塁関連に含まない）
      const isCsType = type==="CS"; // 盗塁刺のみcs加算（牽制死POはcsに含まない）
      if(isSB || isCsType) {
        lineup = lineup.map(p=>{
          const mv = moves.find(m=>m.runner.name===p.name);
          if(!mv) return p;
          const stayed = !mv.isOut && mv.destBi === mv.runner.bi;
          if(stayed) return p;
          if(isSB && !mv.isOut) return {...p, sb:(p.sb||0)+1};  // 盗塁成功
          if(isCsType && mv.isOut) return {...p, cs:(p.cs||0)+1}; // 盗塁刺のみ
          return p;
        });
      }

      // 全ランナーの移動を処理（3塁→2塁→1塁の順で処理して衝突防止）
      const sortedMoves = [...moves].sort((a,b)=>b.runner.bi - a.runner.bi);
      sortedMoves.forEach(({runner, destBi, isOut})=>{
        newBases[runner.bi] = null; // 元の塁を空に
        if(isOut){
          // アウト: 何もしない（塁をnullにするだけ）
        } else if(destBi >= 3){
          // 本塁到達
          scoreAdd++;
          scoredRunners.push(runner.name);
        } else {
          newBases[destBi] = runner.name;
        }
      });

      // スコア加算
      const inning   = g.inning;
      const scoreKey = team+"Score";
      const newScore = scoreAdd>0
        ? {...g[scoreKey], [inning]: (parseInt(g[scoreKey][inning])||0) + scoreAdd}
        : g[scoreKey];

      // 得点者の個人得点加算
      lineup = lineup.map(p=>
        scoredRunners.includes(p.name) ? {...p, run:(p.run||0)+1} : p
      );
      _scoredForEr = [...scoredRunners];  // 自責点モーダル用に保持
      _erInning = g.inning;

      // アウトカウント（isOutのmoveの数だけ増やす）
      const outsAdded = moves.filter(m=>m.isOut).length;

      // ログメッセージ
      const typeLabel = {
        SB:"盗塁成功", CS:"盗塁刺", PO:"牽制アウト", RO:"走塁死",
        WP:"暴投(WP)進塁", PB:"捕逸(PB)進塁", BK:"ボーク(BK)進塁",
        OBI:"走塁妨害で進塁", ADV:"進塁",
      }[type]||type;
      const moveDesc = moves.map(m=>{
        const from = ["1塁","2塁","3塁"][m.runner.bi]||"";
        const to   = m.isOut?"アウト":m.destBi>=3?"本塁":["1塁","2塁","3塁"][m.destBi]||"";
        return m.runner.name+"("+from+"→"+to+")";
      }).join(" / ");
      const log=[{
        ts:new Date().toLocaleTimeString("ja-JP",{hour:"2-digit",minute:"2-digit"}),
        msg:"【"+g[team+"Team"]+"】"+typeLabel+": "+moveDesc+(scoreAdd>0?" ["+scoreAdd+"点]":""),
        runs: scoreAdd,
        logType: scoreAdd>0?"score":(["CS","PO","RO"].includes(type)?"out":"normal")
      },...(g.log||[]).slice(0,99)];

      const outs = Math.min(g.outs + outsAdded, 3);
      const changeOccurs = outs>=3;
      const finalBases   = changeOccurs ? [null,null,null] : newBases;

      // 走塁アウトをbaserunnerOutsに記録（投球回計算用）
      // 現在の守備側の投手インデックスを直接記録する
      const brDefTeam = team==="away"?"home":"away";
      const brPitcherIdx = g[brDefTeam+"PitcherIdx"]||0;
      let brOuts = [...(g.baserunnerOuts||[])];
      if(outsAdded > 0) {
        for(let i=0;i<outsAdded;i++){
          brOuts.push({inning:g.inning, half:g.half, outsAtTime:g.outs+i, defTeam:brDefTeam, pitcherIdx:brPitcherIdx});
        }
      }

      return {...g,
        [lk]:lineup,
        [scoreKey]:newScore,
        bases:finalBases,
        outs:changeOccurs?0:outs,
        inning:changeOccurs?(g.half==="top"?g.inning:Math.min(g.inning+1,15)):g.inning,
        half:changeOccurs?(g.half==="top"?"bottom":"top"):g.half,
        baserunnerOuts:brOuts,
        log};
    });
    // チェンジになった場合のみストライク・ボールカウントをリセット（球数は保持）
    const outsAfter = (game.outs||0) + moves.filter(m=>m.isOut).length;
    if(outsAfter >= 3) {
      setPitchCount(p=>({b:0,s:0,f:0}));
      setPitchHistory([]);
    }
    const toastMsg = {
      SB:"盗塁✅", CS:"盗塁刺❌", PO:"牽制アウト❌", RO:"走塁死❌",
      WP:"WP進塁✅", PB:"PB進塁✅", BK:"ボーク✅",
      OBI:"走塁妨害・進塁✅", ADV:"進塁✅",
    }[type]||type;
    showToast(toastMsg);
    // 得点があれば自責点モーダルを表示(走塁による得点)
    if(_scoredForEr.length > 0){
      const defSide = team==="away" ? "home" : "away";
      setModal({step:"earned_run", defSide, runs:_scoredForEr.length, inning:_erInning, scoredNames:_scoredForEr});
    } else {
      setModal(null);
    }
  },[mutGame]);

  const syncPitcherFromLineup = (g, side) => {

      const _offL = g[defSide==="away"?"homeLineup":"awayLineup"]||[];

      let _seq=0;
      for(let _i=1;_i<=_maxI;_i++){
        for(const _h of ["top","bottom"]){

          const _ha=[];
          _offL.forEach((p,pi)=>{
            const _lg=(p._subOut&&!p._subOuts)?[p._subOut]:[];
            [..._lg,...(p._subOuts||[])].forEach(so=>{const _e=so.atBats&&so.atBats[_i];if(!_e)return;const _a=Array.isArray(_e)?_e:Object.values(_e||{});_a.forEach((_,ei)=>_ha.push({pi,ei:ei-1000}));});
            const _e2=p.atBats&&p.atBats[_i];if(_e2){const _a2=Array.isArray(_e2)?_e2:Object.values(_e2||{});_a2.forEach((_,ei)=>_ha.push({pi,ei}));}
          });
          _ha.sort((a,b)=>a.pi!==b.pi?a.pi-b.pi:a.ei-b.ei);
          _seq+=_ha.length;
        }
      }
      return _seq;
    };
    if(!pitcher) return g;
    const pitchers = [...g[side+"Pitchers"]];
    const currentPIdx = g[side+"PitcherIdx"]||0;
    const currentPitcher = pitchers[currentPIdx];

    if(_optionalChain([currentPitcher, 'optionalAccess', _20 => _20.name]) === pitcher.name) return g;

    // away投手は表(top)を守る、home投手は裏(bottom)を守る
    const pitchHalf = side==="away" ? "top" : "bottom";
    // 現在のハーフが投手の守備ハーフと一致するか
    const sameHalf = g.half === pitchHalf;
    const fromHalf = pitchHalf;
    const fromInning = sameHalf ? g.inning
      : (side==="away" ? g.inning + 1 : g.inning);
    const outsAtStart = sameHalf ? g.outs : 0;
    
    const existIdx = pitchers.findIndex(p=>p.name===pitcher.name);

    const curP = pitchers[currentPIdx];

    // 打席記録があるか確認（攻撃側のlineupにその投手indexへの帰属打席があるか）

      const updatedPitchers = pitchers.map((p,i)=>i===currentPIdx?{...p,name:pitcher.name}:p);

  const substitutePlayer = useCallback((team, outIdx, newName, newPos, reason)=>{
    mutGame(g=>{
      const lk = team+"Lineup";
      const outPlayer = g[lk][outIdx];
      const isPosChange = newName === outPlayer.name; // 同名＝ポジション変更のみ

      // ポジションスワップ：newPosを既に持つ別の選手を探す
      const swapTargetIdx = newPos ? g[lk].findIndex((p,i)=> i!==outIdx && p && p.pos===newPos) : -1;
      const swapTargetOldPos = outPlayer.pos || ""; // outPlayerの元ポジションをswap先に渡す

      const lineup = g[lk].map((p,i)=>{
        // スワップ対象の選手：outPlayerの元ポジションを引き受ける
        if(i===swapTargetIdx) {
          const prevPosLog = p._posLog || [];
          return {...p, pos: swapTargetOldPos,
            _posLog: [...prevPosLog, {pos: p.pos||"", inning: g.inning, half: g.half}]};
        }
        if(i!==outIdx) return p;

        if(isPosChange) {
          // ポジション変更のみ → posLogに履歴を記録
          const prevPosLog = p._posLog || [];
          return {...p, pos: newPos, _posLog: [...prevPosLog, {pos: outPlayer.pos||"", inning: g.inning, half: g.half}]};
        }

        // 選手交代 → 元選手を_subOuts配列に追記（チェーン対応）
        const prevSubOuts = p._subOuts || [];
        // 既に_subOutが1件ある古い形式も吸収
        const legacySubOut = p._subOut && !p._subOuts ? [p._subOut] : [];
        const allPrevious = [...legacySubOut, ...prevSubOuts, {
          name: outPlayer.name,
          pos: outPlayer.pos || "",
          atBats: p.atBats || {},
          sb: p.sb || 0,
          cs: p.cs || 0,
          run: p.run || 0,
          e: p.e || 0,
        }];

        return {
          ...p,
          _subOuts: allPrevious,
          _subOut: null, // 古い形式はクリア
          name: newName,
          pos: newPos,
          subbed: true,
          subNote: reason || "",
          prevName: outPlayer.name,
          atBats: {}, sb: 0, cs: 0, run: 0, e: 0,
        };
      });

      const ts = new Date().toLocaleTimeString("ja-JP",{hour:"2-digit",minute:"2-digit"});
      const swapNote = swapTargetIdx>=0 ? ` ／ ${(g[lk][swapTargetIdx]||{}).name||"?"}:${newPos}→${swapTargetOldPos}` : "";
      const log=[{
        ts,
        msg: isPosChange
          ? `【${g[team+"Team"]}】ポジション変更: ${outPlayer.name} ${outPlayer.pos||"-"}→${newPos}${swapNote} (${g.inning}回${g.half==="top"?"表":"裏"})`
          : `【${g[team+"Team"]}】交代: ${outPlayer.name}(${outPlayer.pos||"-"}) → ${newName}(${newPos||"-"})${reason?` [${reason}]`:""} (${g.inning}回${g.half==="top"?"表":"裏"}）`,
        logType:"sub", runs:0
      },...(g.log||[]).slice(0,99)];

      const defEntry = {
        inning:g.inning, half:g.half, team,
        outName:outPlayer.name, outPos:outPlayer.pos||"",
        inName:newName, inPos:newPos||"",
        reason:reason||"", ts,
      };
      const defenseLog = [...(g.defenseLog||[]), defEntry];
      const updated = {...g,[lk]:lineup,log,defenseLog};

      if(updated.finished) return updated;
      return syncPitcherFromLineup(updated, team);
    });
  },[mutGame]);

      // ただし「違うハーフ」とは今が裏でaway交代 or 今が表でhome交代の場合
      // その場合は次のイニング（4回裏→5回表、4回表→4回裏…はhome）
      // away: 今が裏(bottom)なら次は(inning+1)の表、今が表なら今のイニングの表
      // home: 今が表(top)なら今のイニングの裏、今が裏なら今のイニングの裏
      // fromInning/fromHalfの計算
      // away投手（表に投げる）:
      //   今が表(sameHalf=true) → 今のイニングの表から
      //   今が裏(sameHalf=false) → 次のイニングの表から（inning+1）
      // home投手（裏に投げる）:
      //   今が裏(sameHalf=true) → 今のイニングの裏から
      //   今が表(sameHalf=false) → 今のイニングの裏から（inningそのまま）
      const fromInning = sameHalf ? g.inning
        : (defTeam==="away" ? g.inning + 1 : g.inning);
      const fromHalf = pitchHalf;
      // この時点での守備チームのlineupの総打席数を記録

      // 実際には攻撃チームの打席数が重要：offTeam = defTeam==="away"?"home":"away"

      // computePitcherStatsのallAtBats構築と同じロジックで通し番号を計算

      ].map(Number).filter(n=>!isNaN(n))));
      for(let _inn=1; _inn<=_maxInnNow; _inn++){
        for(const _half of ["top","bottom"]){
          const _battingTeam = _half==="top"?"away":"home";
          if(_battingTeam !== _offSide) continue;
          // 打順ごとに集計（_subOuts含む）
          const _halfAbs = [];
          offLineup.forEach((p,pi)=>{
            // 交代前選手の打席
            const _legacySub = (p._subOut&&!p._subOuts)?[p._subOut]:[];
            [..._legacySub,...(p._subOuts||[])].forEach(so=>{
              const _e = so.atBats&&so.atBats[_inn];
              if(!_e) return;
              const _arr = Array.isArray(_e)?_e:Object.values(_e||{});
              _arr.forEach((_,ei)=>_halfAbs.push({pi,ei:ei-1000}));
            });
            // 現選手の打席
            const _e2 = p.atBats&&p.atBats[_inn];
            if(_e2){
              const _arr2 = Array.isArray(_e2)?_e2:Object.values(_e2||{});
              _arr2.forEach((_,ei)=>_halfAbs.push({pi,ei}));
            }
          });
          _halfAbs.sort((a,b)=>a.pi!==b.pi?a.pi-b.pi:a.ei-b.ei);
          atBatSeqNow += _halfAbs.length;
        }
      }
      const entry = {
        pitcherIdx: newPitcherIdx,
        fromInning,
        fromHalf,
        outsAtStart: sameHalf ? g.outs : 0,
        atBatSeq: atBatSeqNow, // 常に現時点の打席数を記録（イニング間交代も含む）
      };
      const newLog = [...(g[logKey]||[]), entry];
      const log=[{
        ts:new Date().toLocaleTimeString("ja-JP",{hour:"2-digit",minute:"2-digit"}),
        msg:`【${g[defTeam+"Team"]}】投手交代: ${_optionalChain([g, 'access', _21 => _21[defTeam+"Pitchers"], 'access', _22 => _22[newPitcherIdx], 'optionalAccess', _23 => _23.name])||"新投手"} 登板（${g.inning}回${g.half==="top"?"表":"裏"}）`,

  const [editPitchMode, setEditPitchMode] = useState(false);
  const [pitchOverrides, setPitchOverrides] = React.useState(()=>{
    // チーム通算の手動修正はlocalStorageとFirebase(pitch_プレフィックス)からのみ読む

  });

  // Firebase から pitchOverrides を読み込んでマージ（初回のみ）
  React.useEffect(()=>{
    const code = window.__teamShareCode;
    if(!code) return;

      // pitchOverridesはキーが "pitch_" プレフィックスで区別
      const pitchPart = {};
      Object.keys(fbOv||{}).filter(k=>k.startsWith("pitch_")).forEach(k=>{
        pitchPart[k.slice(6)] = fbOv[k];
      });
      if(Object.keys(pitchPart).length===0) return;
      setPitchOverrides(prev=>{
        const merged = {...pitchPart, ...prev};
        localStorage.setItem("pitchOverrides", JSON.stringify(merged));
        return merged;
      });
    });
  },[]);

  const _persistPitchOverrides = (next) => {
    localStorage.setItem("pitchOverrides", JSON.stringify(next));

      // pitchOverridesは "pitch_" プレフィックスでstatOverridesと同じパスに保存
      fbLoadStatOverrides(code).then(existing=>{
        const merged = {...existing};

        Object.keys(merged).filter(k=>k.startsWith("pitch_")).forEach(k=>delete merged[k]);

  };
  const savePitchOverride = (playerKey, field, val) => {

      if(field==="_clear") { delete next[playerKey]; }
      else if(val===undefined){ if(next[playerKey]) { delete next[playerKey][field]; if(Object.keys(next[playerKey]).length===0) delete next[playerKey]; } }
      else next[playerKey] = {...(next[playerKey]||{}), [field]:val};

  const [statOverrides, setStatOverrides] = React.useState(()=>{

  // Firebase から statOverrides を読み込んでマージ（初回のみ）
  React.useEffect(()=>{

  };
  const normalizeTeamName = name => name;

  // 全試合データ（現在の試合 + 履歴）
  // 成績集計は試合終了（finished）した試合のみ対象
  // エイリアスを適用したゲームリスト
  // currentGameが試合終了済みで、historyに未反映の場合も含める
  const _histWithCurrent = (()=>{
    const hist = history||[];
    if(game && game.finished && game.id && !hist.some(h=>h.id===game.id)){
      return [game, ...hist];
    }
    // historyに同IDがあるが古いバージョンの場合はcurrentGameで上書き
    if(game && game.finished && game.id){
      const inHist = hist.find(h=>h.id===game.id);
      if(inHist && (game._ts||0) > (inHist._ts||0)){
        return [game, ...hist.filter(h=>h.id!==game.id)];

    }
    return hist;
  })();
  const allGames = _histWithCurrent.filter(g=>g&&g.awayLineup&&g.homeLineup&&g.finished).map(g=>({
    ...g,
    awayTeam: normalizeTeamName(g.awayTeam),

  }));

  // 全試合に登場するチーム名を収集
  const allTeamNames = [...new Set(allGames.flatMap(g=>[g.awayTeam,g.homeTeam].filter(Boolean)))];

  // 登録チーム（自チーム・対戦相手）との照合でソート
  const registeredTeams = [
    ...(myTeam ? [myTeam] : []),

  // 登録済みチームを先に、未登録チームは後ろに
  const sortedTeamNames = [
    ...allTeamNames.filter(n=>registeredTeams.some(t=>t.name===n)),

  // 日付降順にソート（新しい試合が先頭）
  allGames.sort((a,b)=>{

  // 選択中チーム・シーズン・大会でフィルタした試合
  const filteredGames = allGames.filter(g=>{

    const teamMatch = !selectedTeam || g.awayTeam===selectedTeam || g.homeTeam===selectedTeam;

  // 守備成績集計（失策・ポジション別）
  const aggregateDefenseStats = (filterTeamName) => {
    const map = {};
    filteredGames.forEach(g=>{
      const sides = filterTeamName
        ? (g.awayTeam===filterTeamName?["away"]:g.homeTeam===filterTeamName?["home"]:["away","home"])

      sides.forEach(side=>{
        (g[side+"Lineup"]||[]).forEach(p=>{

  // 選手ごとに全試合の成績を集計（away/home両方から選手名で統合）
  const aggregatePlayerStats = (filterTeamName) => {

            if(["H1","H2","H3","HR"].includes(c)){m.h++;m.tb+=c==="H1"?1:c==="H2"?2:c==="H3"?3:4;}

    });

      const ops_n = (parseFloat("0"+obp)||0)+(parseFloat("0"+slg)||0);
      const ops = ops_n>0?ops_n.toFixed(3).replace(/^0/,""):".---";
      return {...m, pa, avg, slg, obp, ops, games:m.games.size};
    }).sort((a,b)=>{
      const va = typeof a[sortKey]==="string" ? parseFloat("0"+a[sortKey]) : (a[sortKey]||0);
      const vb = typeof b[sortKey]==="string" ? parseFloat("0"+b[sortKey]) : (b[sortKey]||0);
      return sortDesc ? vb-va : va-vb;

  };

  // 投手成績集計
  const aggregatePitcherStats = (filterTeamName, _pitchOv) => {
    const _ov = _pitchOv || pitchOverrides || {};
    const map = {};
    filteredGames.forEach(g=>{
      // filterTeamNameに一致するsideを特定
      const sides = filterTeamName
        ? (g.awayTeam===filterTeamName ? ["away"] : g.homeTeam===filterTeamName ? ["home"] : [])

      const pStats = computePitcherStats(g);
      sides.forEach(side=>{
        const pitchers = g[side+"Pitchers"]||[];
        const autoArr = (pStats[side]||[]);
        // v469: byAppearance廃止。autoArr（pitcherIdx単位）のみ使用
        const rawLog = g[side+"PitcherLog"]||[];

        const sortedRawLog = [...rawLog].sort((a,b)=>a.fromInning-b.fromInning||(a.fromHalf==="top"?0:1)-(b.fromHalf==="top"?0:1));
        const starterIdxForSide = sortedRawLog.length>0 ? sortedRawLog[0].pitcherIdx : 0;
        // pitcherLogが空でも先発(index=0またはstarterIdx)は登板扱い
        // pitcherLogに明示的に登場したインデックスのみ
        const playedIdxSet = new Set(rawLog.map(l=>l.pitcherIdx));
        // pitcherLogが空の場合はindex=0を先発とみなす
        if(rawLog.length===0 && pitchers.length>0) playedIdxSet.add(0);
        pitchers.forEach((p,i)=>{
          if(!p.name) return;
          const isDefaultName = /^投手\d+$/.test(p.name);
          // デフォルト名はpitcherLogに明示登場している場合のみ表示
          // （autoArrに成績があっても先発補完由来の可能性があるため除外）
          if(isDefaultName && !rawLog.some(l=>l.pitcherIdx===i)) return;
          // 非デフォルト名でもpitcherLogに登場しない場合はスキップ
          if(!playedIdxSet.has(i)) return;
          if(!map[p.name]) map[p.name]={name:p.name,outs:0,h:0,er:0,bb:0,k:0,hbp:0,hr:0,runs:0,games:new Set(),outsXinnings:0,win:0,lose:0,save:0,hold:0,bs:0};
          const m = map[p.name];

          // 打席データから再計算した値を使用。manual値がある場合は優先
          const autoIpOuts = Math.floor((a.autoIp||0)/10)*3 + ((a.autoIp||0)%10);
          const outsGot = p.manualIp !== undefined ? p.manualIp : autoIpOuts;
          m.outs += outsGot;
          m.h    += p.manualH  !==undefined ? p.manualH   : (a.autoH||0);
          // 自責点: モーダルで記録したerManualを優先。旧データのer(manualOverride)もフォールバックで考慮
          m.er   += p.erManual!==undefined ? p.erManual : ((p.manualOverride && p.er!==undefined) ? p.er : 0);
          m.bb   += p.manualBb !==undefined ? p.manualBb  : (a.autoBb||0);
          m.k    += p.manualK  !==undefined ? p.manualK   : (a.autoK||0);

          // 防御率計算用：投球アウト数×試合のイニング数を累積

    return Object.values(map).map(m=>{

      // 加重平均イニング数（投球アウト数で重み付け）

  // 選択チームの打撃成績（選択なしの場合は現在の試合のチームを表示）

  const recent5 = filteredGames.slice(0,5);

  const BattingTable = ({players, teamName, color, editMode, statOverrides, saveOverride, clearOverride}) => {

      , React.createElement('div', {style:{overflowX:"auto"}}

            , React.createElement('tr', null

// ===== Firebase チーム復元コンポーネント =====
function FirebaseTeamLoader({ onLoaded }) {
  const [teamId, setTeamId] = useState("");
  const [adminCode, setAdminCode] = useState("");
  const [loading, setLoading] = useState(false);
  const [msg, setMsg] = useState("");
  const [asMyTeam, setAsMyTeam] = useState(true);

  const handleLoad = () => {
    const id = teamId.trim();
    const ac = adminCode.trim().toUpperCase();
    if(!id){ setMsg("チームIDを入力してください"); return; }
    if(!ac){ setMsg("管理者コードを入力してください"); return; }
    if(!fbInit()){ setMsg("Firebaseに接続できません"); return; }
    setLoading(true);
    setMsg("検索中...");
    fbDB.ref("shared_teams/"+id).once("value").then(snap=>{
      setLoading(false);
      if(!snap||!snap.exists()||!snap.val()){
        setMsg("チームが見つかりません");
        return;
      }
      const team = snap.val();
      if((team.adminCode||"").toUpperCase() !== ac){
        setMsg("管理者コードが違います");
        return;
      }
      setMsg("");
      setTeamId("");
      setAdminCode("");
      onLoaded(team, asMyTeam);
    }).catch(e=>{
      setLoading(false);
      setMsg("エラー: "+e.message);
    });
  };

  return (
    React.createElement('div', null
      , React.createElement('div', {style:{display:"flex",gap:8,marginBottom:8,flexWrap:"wrap"}}
        , React.createElement('div', {style:{flex:1,minWidth:120}}
          , React.createElement('div', {style:{fontSize:11,color:"#9fb3a5",marginBottom:4}}, "チームコード or チームID")
          , React.createElement('input', {
              value: teamId,
              onChange: e=>setTeamId(e.target.value),
              placeholder: "チームコード or チームID",
              style:{...S.si, width:"100%", padding:"7px 10px", fontSize:12}
            })
        )
        , React.createElement('div', {style:{flex:1,minWidth:100}}
          , React.createElement('div', {style:{fontSize:11,color:"#9fb3a5",marginBottom:4}}, "管理者コード")
          , React.createElement('input', {
              value: adminCode,
              onChange: e=>setAdminCode(e.target.value.toUpperCase()),
              placeholder: "例: AB1C2D",
              style:{...S.si, width:"100%", padding:"7px 10px", fontSize:12, fontFamily:"monospace", letterSpacing:2}
            })
        )
      )
      , React.createElement('div', {style:{display:"flex",gap:10,alignItems:"center",marginBottom:10}}
        , React.createElement('span', {style:{fontSize:12,color:"#7db8e8"}}, "復元先:")
        , [["自チーム",true],["対戦相手",false]].map(([label,val])=>
            React.createElement('button', {key:label, onClick:()=>setAsMyTeam(val),
              style:{padding:"4px 12px",borderRadius:7,cursor:"pointer",fontSize:12,fontWeight:700,
                background:asMyTeam===val?"#1d4ed833":"transparent",
                border:"1.5px solid "+(asMyTeam===val?"#3b82f6":"#33573c"),
                color:asMyTeam===val?"#7dd3fc":"#7db8e8"}}, label)

    // 3塁→本塁、2塁→3塁、1塁→2塁 の順で処理（上書き防止）
    for (let i = 2; i >= 0; i--) {
      if (bases[i]) {
        if (i === 2) { scored++; }
        else { nb[i+1] = bases[i]; }
      }
    }
    return { nb, scored };
  };

class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = {err: null}; }
  static getDerivedStateFromError(e) { return {err: e}; }
  componentDidCatch(e, info) {
    console.error("[REACT ERROR]", e && e.message || e);
    console.error("[REACT STACK]", e && e.stack ? e.stack.slice(0, 300) : "no stack");
    console.error("[COMPONENT STACK]", info && info.componentStack ? info.componentStack.slice(0, 300) : "");
  }
  render() {
    if(this.state.err) {
      return React.createElement('div', {style:{color:'white',padding:20,background:'#1a1a2e',minHeight:'100vh'}},
        React.createElement('h2', null, '⚠️ レンダリングエラー'),
        React.createElement('pre', {style:{fontSize:11,color:'#ff7d72',whiteSpace:'pre-wrap'}}, 
          (this.state.err.message||'') + '\n' + (this.state.err.stack||'').slice(0,500))
      );
    }
    return this.props.children;
  }
}

try {
  ReactDOM.createRoot(document.getElementById('root')).render(
    React.createElement(ErrorBoundary, null, React.createElement(App))
  );
} catch(e) {
  document.getElementById('root').innerHTML = '<div style="color:white;padding:20px;font-size:14px"><h2>起動エラー</h2><pre style="white-space:pre-wrap;font-size:11px">' + (e.stack||e.message) + '</pre></div>';
}
  
</script>

          const nw = reg.installing;
          nw.addEventListener('statechange', () => {
            if(nw.state === 'installed' && navigator.serviceWorker.controller) {
              window.location.reload();
            }
          });
        });
      });
  });
}
</script>
